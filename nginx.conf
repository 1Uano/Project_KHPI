server {
    listen 80;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 403 /403.html;
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 500 502 503 504 /500.html;
    location = /500.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Proxy API endpoints to FastAPI container
    location /auth/ {
        proxy_pass http://app:8000/auth/;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://app:8000/admin/;
        proxy_set_header Host $host;
    }

    location /records/ {
        proxy_pass http://app:8000/records/;
        proxy_set_header Host $host;
    }

    location /prescriptions/ {
        proxy_pass http://app:8000/prescriptions/;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://app:8000/health;
        proxy_set_header Host $host;
    }
}
